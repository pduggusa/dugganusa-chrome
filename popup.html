<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #c9d1d9; }
    .header { padding: 16px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 14px; font-weight: 700; }
    .header .accent { color: #00d4aa; }
    .content { padding: 16px; }
    .lookup { display: flex; gap: 8px; margin-bottom: 12px; }
    .lookup input { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #c9d1d9; font-size: 13px; outline: none; }
    .lookup input:focus { border-color: #00d4aa; }
    .lookup button { background: #00d4aa; color: #0f1117; border: none; border-radius: 6px; padding: 8px 14px; font-weight: 700; font-size: 13px; cursor: pointer; position: relative; overflow: hidden; }
    .lookup button::after { content:''; position:absolute; top:-50%;left:-100%;width:60%;height:200%; background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.15) 50%,transparent 70%); animation:shimmer 4s ease-in-out infinite; pointer-events:none; }
    @keyframes shimmer { 0%{left:-100%} 40%{left:120%} 100%{left:120%} }
    .result { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 8px; font-size: 12px; display: none; }
    .result.found { border-color: #ff4757; }
    .result.clean { border-color: #3fb950; }
    .result .value { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #fff; }
    .result .summary { color: #8b949e; margin-top: 4px; }
    .result .hits { color: #ff4757; font-weight: 600; }
    .stats { font-size: 11px; color: #8b949e; padding-top: 8px; border-top: 1px solid #30363d; margin-top: 8px; }
    .links { display: flex; gap: 12px; margin-top: 12px; }
    .links a { color: #00d4aa; font-size: 11px; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .beta { display: inline-flex; align-items: center; gap: 4px; background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); padding: 2px 6px; border-radius: 100px; font-size: 10px; color: #ff4757; font-weight: 600; }
    .beta .dot { width: 5px; height: 5px; background: #ff4757; border-radius: 50%; animation: pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  </style>
</head>
<body>
  <div class="header">
    <span class="accent" style="font-size:18px;font-weight:800;">D</span>
    <h1>DugganUSA <span class="accent">Threat Intel</span></h1>
    <span class="beta"><span class="dot"></span>Beta</span>
  </div>
  <div class="content">
    <div class="lookup">
      <input type="text" id="input" placeholder="IP, domain, hash, or CVE..." autofocus>
      <button id="btn">Scan</button>
    </div>
    <div class="result" id="result">
      <div class="value" id="resultValue"></div>
      <div class="summary" id="resultSummary"></div>
    </div>
    <div class="stats" id="stats">1,080,000+ IOCs · 275+ consumers · 46 countries</div>
    <div class="links">
      <a href="https://aipmsec.com" target="_blank">AIPM Audit</a>
      <a href="https://analytics.dugganusa.com/stix/register" target="_blank">Free API Key</a>
      <a href="https://www.dugganusa.com" target="_blank">dugganusa.com</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
